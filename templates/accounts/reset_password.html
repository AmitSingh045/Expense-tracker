{% extends 'base.html' %}
{% block title %}Reset Password | Antigravity Pay{% endblock %}
{% block content %}
<div class="row align-items-center justify-content-center min-vh-100" style="margin-top: -50px;">
    <div class="col-12 col-sm-10 col-md-8 col-lg-5">
        <div class="glass-card p-5">
            <h2 class="fw-bold mb-1 text-center">Reset Password</h2>
            <p class="text-secondary text-center mb-4">Enter a new secure password for your account.</p>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-semibold">New Password</label>
                    <input type="password" name="password" required class="form-control glass-input" placeholder="••••••••">
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold">Confirm Password</label>
                    <input type="password" name="password_confirm" required class="form-control glass-input" placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-glass-primary w-100 py-3 mb-3 shadow">Update Password</button>
                <div class="text-center">
                    <a href="{% url 'login' %}" class="small text-decoration-none fw-bold">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
