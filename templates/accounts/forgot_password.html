{% extends 'base.html' %}
{% block title %}Forgot Password | Antigravity Pay{% endblock %}
{% block content %}
<div class="row align-items-center justify-content-center min-vh-100" style="margin-top: -50px;">
    <div class="col-12 col-sm-10 col-md-8 col-lg-5">
        <div class="glass-card p-5">
            <h2 class="fw-bold mb-1 text-center">Forgot Password</h2>
            <p class="text-secondary text-center mb-4">Enter your email and we'll send you a password reset link.</p>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label small fw-semibold">Email Address</label>
                    <input type="email" name="email" required class="form-control glass-input" placeholder="Enter your email">
                </div>
                <button type="submit" class="btn btn-glass-primary w-100 py-3 mb-3 shadow">Send Reset Link</button>
                <div class="text-center">
                    <a href="{% url 'login' %}" class="small text-decoration-none fw-bold">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
