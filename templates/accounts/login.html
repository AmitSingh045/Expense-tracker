{% extends 'base.html' %}
{% load static %}

{% block title %}Sign In | Antigravity Pay{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="w-100" style="max-width: 440px;">
        <div class="glass-card p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center text-white p-3 rounded-4 mb-3 shadow" style="background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));">
                    <i class="bi bi-wallet2 fs-3"></i>
                </div>
                <h2 class="fw-bold mb-1">Welcome Back</h2>
                <p class="text-secondary mb-0" style="font-size: 0.9rem;">Sign in to manage your budget and assets.</p>
            </div>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text glass-input border-end-0 bg-transparent text-secondary"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" required class="form-control glass-input border-start-0" placeholder="Enter username">
                    </div>
                </div>
                
                <div class="mb-3">
                    <div class="d-flex justify-content-between mb-1">
                        <label class="form-label small fw-semibold mb-0">Password</label>
                        <a href="{% url 'forgot_password' %}" class="small text-decoration-none">Forgot password?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text glass-input border-end-0 bg-transparent text-secondary"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" required class="form-control glass-input border-start-0" placeholder="Enter password">
                    </div>
                </div>
                
                <div class="form-check mb-4">
                    <input class="form-check-input glass-input" type="checkbox" name="remember_me" id="rememberMe">
                    <label class="form-check-label small text-secondary" for="rememberMe">
                        Remember me for 2 weeks
                    </label>
                </div>
                
                <button type="submit" class="btn btn-glass-primary w-100 py-3 mb-4 shadow fw-bold">Sign In</button>
                
                <div class="text-center">
                    <span class="small text-secondary">Don't have an account? </span>
                    <a href="{% url 'register' %}" class="small text-decoration-none fw-bold">Sign Up</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
